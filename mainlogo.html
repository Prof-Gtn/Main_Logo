<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Tech - Premium Logo</title>
    <style>
        /* ===== GENERATIVE TECH PREMIUM LOGO ===== */
        :root {
            --gt-primary: #8b5cf6;
            --gt-secondary: #3b82f6;
            --gt-accent: #60a5fa;
            --gt-light: #a78bfa;
            --gt-dark: #0f172a;
            --gt-gray: #94a3b8;
            --gt-white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 40px;
        }
        
        .logo-showcase {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        
        /* PREMIUM CLOUD LOGO */
        .premium-logo {
            display: inline-block;
            width: 240px;
            height: 240px;
            position: relative;
            margin-bottom: 60px;
            filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.2));
        }
        
        /* CLOUD LAYERS */
        .cloud-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: cloudFloat 8s ease-in-out infinite;
        }
        
        .layer-1 {
            background: radial-gradient(circle at 30% 30%, 
                rgba(139, 92, 246, 0.8) 0%,
                rgba(139, 92, 246, 0.4) 30%,
                transparent 70%);
            filter: blur(15px);
            animation-delay: 0s;
        }
        
        .layer-2 {
            background: radial-gradient(circle at 70% 70%, 
                rgba(99, 102, 241, 0.7) 0%,
                rgba(99, 102, 241, 0.3) 40%,
                transparent 80%);
            filter: blur(20px);
            animation-delay: 1s;
            animation-duration: 10s;
        }
        
        .layer-3 {
            background: radial-gradient(circle at 40% 60%, 
                rgba(59, 130, 246, 0.6) 0%,
                rgba(59, 130, 246, 0.2) 50%,
                transparent 85%);
            filter: blur(25px);
            animation-delay: 2s;
            animation-duration: 12s;
        }
        
        /* FLOATING ORBS */
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.9), 
                rgba(255, 255, 255, 0.2));
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            animation: orbFloat 6s ease-in-out infinite;
        }
        
        .orb-1 { width: 18px; height: 18px; top: 40px; left: 60px; animation-delay: 0s; }
        .orb-2 { width: 14px; height: 14px; top: 80px; right: 50px; animation-delay: 1s; }
        .orb-3 { width: 12px; height: 12px; bottom: 60px; left: 50px; animation-delay: 2s; }
        .orb-4 { width: 16px; height: 16px; bottom: 40px; right: 70px; animation-delay: 3s; }
        
        /* DATA STREAMS */
        .data-stream {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--gt-accent), transparent);
            animation: dataStream 4s linear infinite;
        }
        
        .stream-1 { height: 100px; top: 20px; left: 50%; animation-delay: 0s; }
        .stream-2 { height: 80px; top: 30%; right: 30px; animation-delay: 0.5s; transform: rotate(45deg); }
        .stream-3 { height: 90px; bottom: 30%; left: 30px; animation-delay: 1s; transform: rotate(-45deg); }
        
        /* PULSING RINGS */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            animation: ringPulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        .ring-1 { width: 160px; height: 160px; animation-delay: 0s; }
        .ring-2 { width: 200px; height: 200px; animation-delay: 0.5s; }
        .ring-3 { width: 240px; height: 240px; animation-delay: 1s; }
        
        /* PREMIUM GT LETTERS */
        .premium-gt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -4px;
            text-shadow: 
                0 0 30px rgba(255, 255, 255, 0.8),
                0 0 60px rgba(139, 92, 246, 0.6),
                0 0 90px rgba(59, 130, 246, 0.4);
            animation: gtGlow 4s ease-in-out infinite alternate;
            z-index: 100;
            font-family: 'Inter', sans-serif;
        }
        
        /* COMPANY NAME */
        .company-name {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, 
                var(--gt-primary) 0%,
                var(--gt-light) 25%,
                var(--gt-secondary) 50%,
                var(--gt-accent) 75%,
                var(--gt-primary) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            margin-bottom: 16px;
            animation: gradientShift 8s ease infinite;
        }
        
        .company-tagline {
            color: var(--gt-gray);
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }
        
        .company-tagline::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
        }
        
        /* ANIMATIONS */
        @keyframes cloudFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            33% { transform: translateY(-15px) scale(1.02); }
            66% { transform: translateY(10px) scale(0.98); }
        }
        
        @keyframes orbFloat {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; }
            25% { transform: translateY(-20px) translateX(10px) scale(1.1); opacity: 1; }
            50% { transform: translateY(10px) translateX(-10px) scale(0.9); opacity: 0.7; }
            75% { transform: translateY(-10px) translateX(-5px) scale(1.05); opacity: 0.9; }
        }
        
        @keyframes dataStream {
            0% { transform: translateY(-100%) scaleY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%) scaleY(1); opacity: 0; }
        }
        
        @keyframes ringPulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.5; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        
        @keyframes gtGlow {
            0% {
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 0.8),
                    0 0 40px rgba(139, 92, 246, 0.6),
                    0 0 60px rgba(59, 130, 246, 0.4);
            }
            100% {
                text-shadow: 
                    0 0 30px rgba(255, 255, 255, 1),
                    0 0 60px rgba(139, 92, 246, 0.8),
                    0 0 100px rgba(59, 130, 246, 0.6);
            }
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .premium-logo {
                width: 180px;
                height: 180px;
            }
            
            .premium-gt {
                font-size: 60px;
            }
            
            .company-name {
                font-size: 48px;
            }
            
            .orb-1, .orb-2, .orb-3, .orb-4 {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="logo-showcase">
        <!-- PREMIUM CLOUD LOGO -->
        <div class="premium-logo">
            <!-- Cloud Layers -->
            <div class="cloud-layer layer-1"></div>
            <div class="cloud-layer layer-2"></div>
            <div class="cloud-layer layer-3"></div>
            
            <!-- Pulsing Rings -->
            <div class="pulse-ring ring-1"></div>
            <div class="pulse-ring ring-2"></div>
            <div class="pulse-ring ring-3"></div>
            
            <!-- Data Streams -->
            <div class="data-stream stream-1"></div>
            <div class="data-stream stream-2"></div>
            <div class="data-stream stream-3"></div>
            
            <!-- Floating Orbs -->
            <div class="floating-orb orb-1"></div>
            <div class="floating-orb orb-2"></div>
            <div class="floating-orb orb-3"></div>
            <div class="floating-orb orb-4"></div>
            
            <!-- Premium GT Letters -->
            <div class="premium-gt">GT</div>
        </div>
        
        <!-- Company Name & Tagline -->
        <div class="company-name">Generative Tech</div>
        <div class="company-tagline">AI-Powered Innovation Cloud</div>
    </div>
</body>
</html>
